<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal HTTP/MMTLS Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        <div class="flex flex-col md:flex-row justify-between items-center bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-xl">
            <div>
                <h1 class="text-2xl font-black text-blue-400 tracking-tight">🛡️ UNIVERSAL TRAFFIC ANALYZER</h1>
                <p class="text-xs text-gray-500 uppercase font-bold tracking-widest">Advanced Security Intelligence Dashboard</p>
            </div>
            <div class="mt-4 md:mt-0">
                <input type="file" id="csvFile" accept=".csv" class="hidden">
                <button onclick="document.getElementById('csvFile').click()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold text-sm transition-all shadow-lg shadow-blue-900/20 cursor-pointer">
                    LADI CSV ANALÜÜS
                </button>
            </div>
        </div>

        <div id="welcomeScreen" class="text-center py-20 bg-gray-900/50 border border-gray-800 rounded-2xl">
            <p class="text-gray-400">Alustamiseks laadi üles <strong>http_analuys.csv</strong> fail.</p>
        </div>

        <div id="dashboard" class="hidden space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl shadow-sm">
                    <div class="flex flex-wrap gap-2 justify-between items-center mb-6">
                        <select id="sourceLeft" onchange="updateChart('left')" class="bg-gray-800 text-xs border border-gray-700 rounded px-2 py-1 outline-none text-blue-400 font-bold">
                            <option value="crypto">Sisu tüüp / Krüpto</option>
                            <option value="method">HTTP Meetod / ID</option>
                            <option value="entropy">Entropia jaotus</option>
                            <option value="size">Paketi suurused</option>
                        </select>
                        <select id="typeLeft" onchange="updateChart('left')" class="bg-gray-800 text-[10px] border border-gray-700 rounded px-2 py-1 outline-none text-gray-400 uppercase">
                            <option value="doughnut">Doughnut</option>
                            <option value="bar">Bar</option>
                            <option value="pie">Pie</option>
                        </select>
                    </div>
                    <div class="relative h-64">
                        <canvas id="chartLeft"></canvas>
                    </div>
                </div>

                <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl shadow-sm">
                    <div class="flex flex-wrap gap-2 justify-between items-center mb-6">
                        <select id="sourceRight" onchange="updateChart('right')" class="bg-gray-800 text-xs border border-gray-700 rounded px-2 py-1 outline-none text-emerald-400 font-bold">
                            <option value="method">HTTP Meetod / ID</option>
                            <option value="crypto">Sisu tüüp / Krüpto</option>
                            <option value="entropy" selected>Entropia jaotus</option>
                            <option value="size">Paketi suurused</option>
                        </select>
                        <select id="typeRight" onchange="updateChart('right')" class="bg-gray-800 text-[10px] border border-gray-700 rounded px-2 py-1 outline-none text-gray-400 uppercase">
                            <option value="bar">Bar</option>
                            <option value="doughnut">Doughnut</option>
                            <option value="pie">Pie</option>
                        </select>
                    </div>
                    <div class="relative h-64">
                        <canvas id="chartRight"></canvas>
                    </div>
                </div>
            </div>

            <div class="bg-gray-900 border border-gray-800 p-4 rounded-2xl flex flex-wrap gap-4 items-center justify-between">
                <div class="flex flex-wrap gap-3 flex-grow">
                    <input type="text" id="tableSearch" onkeyup="filterAndRenderTable()" placeholder="Otsi päringut, sisu, URL-i..." class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 text-sm w-full md:w-64 focus:ring-2 focus:ring-blue-500 outline-none">
                    <select id="cryptoFilter" onchange="filterAndRenderTable()" class="bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 text-sm outline-none cursor-pointer">
                        <option value="">Kõik sisu tüübid</option>
                    </select>
                </div>
                <div class="text-xs font-mono text-gray-500 bg-black/30 px-3 py-2 rounded-lg">
                    Leitud: <span id="filteredCount" class="text-blue-400 font-bold">0</span> / <span id="totalCount">0</span>
                </div>
            </div>

            <div class="bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden shadow-2xl">
                <div class="overflow-x-auto custom-scrollbar max-h-[500px]">
                    <table class="min-w-full divide-y divide-gray-800 text-left">
                        <thead class="bg-gray-900/90 sticky top-0 z-20">
                            <tr class="text-[10px] uppercase tracking-widest text-gray-500 font-bold">
                                <th class="px-4 py-4">#</th>
                                <th class="px-4 py-4">Meetod/ID</th>
                                <th class="px-4 py-4">Pikkus</th>
                                <th class="px-4 py-4">Entropia</th>
                                <th class="px-4 py-4">Sisu Tüüp / Krüpto</th>
                                <th class="px-4 py-4">Struktuur</th>
                                <th class="px-4 py-4">Eelvaade</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-800 text-xs">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let globalData = [];
        let charts = { left: null, right: null };

        document.getElementById('csvFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                delimiter: ";",
                skipEmptyLines: true,
                header: true,
                complete: (results) => {
                    globalData = results.data;
                    initDashboard();
                }
            });
        });

        function initDashboard() {
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('totalCount').innerText = globalData.length;

            populateFilters();
            updateChart('left');
            updateChart('right');
            filterAndRenderTable();
        }

        function populateFilters() {
            const cryptoCol = "Sisu_Tyyp_ja_Krypto";
            const filterSelect = document.getElementById('cryptoFilter');
            const uniqueTypes = [...new Set(globalData.map(row => row[cryptoCol]))].filter(Boolean).sort();
            
            filterSelect.innerHTML = '<option value="">Kõik sisu tüübid</option>';
            uniqueTypes.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t; opt.innerText = t;
                filterSelect.appendChild(opt);
            });
        }

        function getChartData(source) {
            const labels = [];
            const counts = {};

            globalData.forEach(row => {
                let key = "Teadmata";
                if (source === 'crypto') key = row["Sisu_Tyyp_ja_Krypto"];
                if (source === 'method') key = row["HTTP_Meetod_või_ID"];
                if (source === 'entropy') {
                    const e = parseFloat(row["Entropia"]);
                    if (e < 3) key = "Madal (<3)";
                    else if (e < 5) key = "Keskmine (3-5)";
                    else if (e < 7) key = "Kõrge (5-7)";
                    else key = "Krüpteeritud (>7)";
                }
                if (source === 'size') {
                    const s = parseInt(row["Sisu_Pikkus_Baiti"]);
                    if (s < 100) key = "Väike (<100B)";
                    else if (s < 1024) key = "Keskmine (100B-1KB)";
                    else key = "Suur (>1KB)";
                }
                counts[key] = (counts[key] || 0) + 1;
            });

            return {
                labels: Object.keys(counts),
                data: Object.values(counts)
            };
        }

        function updateChart(side) {
            const source = document.getElementById(side === 'left' ? 'sourceLeft' : 'sourceRight').value;
            const type = document.getElementById(side === 'left' ? 'typeLeft' : 'typeRight').value;
            const ctx = document.getElementById(side === 'left' ? 'chartLeft' : 'chartRight').getContext('2d');
            const chartData = getChartData(source);

            if (charts[side]) charts[side].destroy();

            charts[side] = new Chart(ctx, {
                type: type,
                data: {
                    labels: chartData.labels,
                    datasets: [{
                        data: chartData.data,
                        backgroundColor: ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#06B6D4'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { 
                            position: 'bottom', 
                            labels: { color: '#9ca3af', font: { size: 10 }, padding: 15 } 
                        }
                    },
                    scales: type === 'bar' ? {
                        y: { beginAtZero: true, grid: { color: '#1f2937' }, ticks: { color: '#6b7280' } },
                        x: { grid: { display: false }, ticks: { color: '#6b7280' } }
                    } : {}
                }
            });
        }

        function filterAndRenderTable() {
            const search = document.getElementById('tableSearch').value.toLowerCase();
            const cryptoFilter = document.getElementById('cryptoFilter').value;

            const filtered = globalData.filter(row => {
                const matchesCrypto = !cryptoFilter || row["Sisu_Tyyp_ja_Krypto"] === cryptoFilter;
                const matchesSearch = Object.values(row).some(v => String(v).toLowerCase().includes(search));
                return matchesCrypto && matchesSearch;
            });

            document.getElementById('filteredCount').innerText = filtered.length;
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";

            filtered.forEach(row => {
                const entropy = parseFloat(row["Entropia"]) || 0;
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-800/40 transition-colors border-b border-gray-800/50";
                tr.innerHTML = `
                    <td class="px-4 py-3 text-gray-500 font-mono">#${row["Päring_Nr"]}</td>
                    <td class="px-4 py-3 font-bold text-blue-400">${row["HTTP_Meetod_või_ID"]}</td>
                    <td class="px-4 py-3 text-gray-300">${row["Sisu_Pikkus_Baiti"]} B</td>
                    <td class="px-4 py-3 font-bold ${entropy > 7 ? 'text-emerald-400' : 'text-amber-500'}">${entropy.toFixed(3)}</td>
                    <td class="px-4 py-3">
                        <span class="px-2 py-0.5 rounded-full text-[10px] font-bold border ${entropy > 6 ? 'bg-emerald-900/30 text-emerald-400 border-emerald-800' : 'bg-blue-900/30 text-blue-400 border-blue-800'}">
                            ${row["Sisu_Tyyp_ja_Krypto"]}
                        </span>
                    </td>
                    <td class="px-4 py-3 text-gray-500 italic truncate max-w-[150px]">${row["Sonumi_Struktuur"]}</td>
                    <td class="px-4 py-3">
                        <div class="font-mono text-[10px] bg-black/40 p-2 rounded border border-gray-800 text-gray-400 max-w-xs overflow-hidden text-ellipsis">
                            ${row["Sisu_Eelvaade"]}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
